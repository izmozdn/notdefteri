<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Günlük Yapılacaklar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }
  .container {
    position: relative;
    background: #fffdf5;
    background-image:
      repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 27px,
        #d8e4f0 27px,
        #d8e4f0 28px
      );
    width: 100%;
    max-width: 580px;
    border-radius: 4px 14px 14px 4px;
    box-shadow:
      0 12px 40px rgba(0,0,0,0.25),
      inset 0 0 60px rgba(0,0,0,0.03);
    padding: 28px 28px 28px 70px;
    margin-top: 40px;
  }
  /* Kırmızı kenar çizgisi (klasik defter) */
  .container::before {
    content: '';
    position: absolute;
    left: 56px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #f0a5a5;
    opacity: 0.7;
  }
  /* Spiral cilt şeridi */
  .container::after {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 38px;
    background:
      radial-gradient(
        circle at 50% 18px,
        #6b6b75 0 7px,
        #2c2c30 7px 9px,
        transparent 10px
      ),
      radial-gradient(
        circle at 50% 50px,
        #6b6b75 0 7px,
        #2c2c30 7px 9px,
        transparent 10px
      ),
      linear-gradient(to right,
        rgba(0,0,0,0.06) 0%,
        rgba(0,0,0,0.02) 60%,
        transparent 100%);
    background-repeat: repeat-y;
    background-size: 100% 32px, 100% 32px, 100% 100%;
    background-position: 0 0, 0 0, 0 0;
    border-right: 1px solid rgba(0,0,0,0.05);
  }
  /* Daha temiz spiral: tek bir gradient ile çoklu delik */
  .spiral {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 38px;
    pointer-events: none;
    background:
      linear-gradient(to right,
        rgba(0,0,0,0.08) 0%,
        rgba(0,0,0,0.02) 70%,
        transparent 100%);
    z-index: 1;
  }
  .spiral-hole {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 35%,
        #1a1a1f 0%,
        #2c2c30 40%,
        #555 70%,
        #888 100%);
    box-shadow:
      inset 0 2px 3px rgba(0,0,0,0.6),
      inset 0 -1px 2px rgba(255,255,255,0.15),
      0 1px 1px rgba(255,255,255,0.4);
  }
  h1 {
    color: #333;
    font-size: 24px;
    margin-bottom: 6px;
  }
  .date {
    color: #888;
    font-size: 14px;
    margin-bottom: 20px;
  }
  .input-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    margin-bottom: 8px;
  }
  .input-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 18px;
  }
  #taskInput, #dueDateInput, #priorityInput {
    padding: 12px 14px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    background: #fff;
  }
  #taskInput:focus, #dueDateInput:focus, #priorityInput:focus { border-color: #667eea; }
  button {
    padding: 12px 20px;
    background: #667eea;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #5568d3; }
  .stats {
    display: flex;
    justify-content: space-between;
    color: #666;
    font-size: 13px;
    margin-bottom: 12px;
    padding: 0 4px;
  }
  .filters {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .filter-btn {
    flex: 1;
    padding: 8px;
    background: #f0f0f5;
    color: #555;
    font-size: 13px;
    border-radius: 6px;
  }
  .filter-btn:hover { background: #e5e5ec; }
  .filter-btn.active {
    background: #667eea;
    color: #fff;
  }
  ul {
    list-style: none;
    max-height: 50vh;
    overflow-y: auto;
  }
  li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    border: 1px solid #eee;
    border-left: 4px solid #ccc;
    border-radius: 8px;
    margin-bottom: 8px;
    transition: background 0.2s, opacity 0.2s, transform 0.2s;
    cursor: grab;
  }
  li:hover { background: #fafaff; }
  li.dragging {
    opacity: 0.4;
    cursor: grabbing;
  }
  li.drag-over {
    border-top: 3px solid #667eea;
  }
  li.priority-high { border-left-color: #e74c3c; }
  li.priority-medium { border-left-color: #f39c12; }
  li.priority-low { border-left-color: #2ecc71; }
  .drag-handle {
    color: #bbb;
    font-size: 16px;
    cursor: grab;
    user-select: none;
    padding: 0 2px;
  }
  li input[type="checkbox"] {
    width: 20px;
    height: 20px;
    cursor: pointer;
    accent-color: #667eea;
    flex-shrink: 0;
  }
  .task-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }
  .task-text {
    color: #333;
    font-size: 15px;
    word-break: break-word;
  }
  li.done .task-text {
    text-decoration: line-through;
    color: #aaa;
  }
  .task-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    font-size: 12px;
  }
  .badge {
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  .badge-priority-high { background: #fee; color: #c0392b; }
  .badge-priority-medium { background: #fef3e2; color: #b87503; }
  .badge-priority-low { background: #e8f8ef; color: #1e8449; }
  .badge-due {
    background: #eef;
    color: #4858a8;
  }
  .badge-due.overdue {
    background: #fdd;
    color: #c0392b;
  }
  .badge-due.today {
    background: #fff3cd;
    color: #856404;
  }
  .delete-btn {
    background: transparent;
    color: #e74c3c;
    padding: 4px 10px;
    font-size: 18px;
    flex-shrink: 0;
  }
  .delete-btn:hover {
    background: #fee;
  }
  .empty {
    text-align: center;
    color: #aaa;
    padding: 30px 0;
    font-size: 14px;
  }
  .clear-done {
    width: 100%;
    margin-top: 10px;
    background: #f0f0f5;
    color: #666;
    font-size: 13px;
    padding: 10px;
  }
  .clear-done:hover { background: #ffe0e0; color: #c0392b; }
</style>
</head>
<body>
  <div class="container">
    <h1>📝 Günlük Yapılacaklar</h1>
    <div class="date" id="dateLabel"></div>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Yeni bir görev ekle..." maxlength="200">
      <button id="addBtn">Ekle</button>
    </div>
    <div class="input-options">
      <input type="date" id="dueDateInput" title="Son tarih">
      <select id="priorityInput" title="Öncelik">
        <option value="">Öncelik (yok)</option>
        <option value="high">🔴 Yüksek</option>
        <option value="medium">🟡 Orta</option>
        <option value="low">🟢 Düşük</option>
      </select>
    </div>

    <div class="stats">
      <span id="totalCount">0 görev</span>
      <span id="doneCount">0 tamamlandı</span>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Tümü</button>
      <button class="filter-btn" data-filter="active">Aktif</button>
      <button class="filter-btn" data-filter="done">Tamamlanan</button>
    </div>

    <ul id="taskList"></ul>

    <button class="clear-done" id="clearDoneBtn">Tamamlananları Temizle</button>
  </div>

<script>
  const STORAGE_KEY = 'gunluk_yapilacaklar';
  let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let currentFilter = 'all';
  let dragSrcId = null;

  const taskInput = document.getElementById('taskInput');
  const dueDateInput = document.getElementById('dueDateInput');
  const priorityInput = document.getElementById('priorityInput');
  const addBtn = document.getElementById('addBtn');
  const taskList = document.getElementById('taskList');
  const totalCount = document.getElementById('totalCount');
  const doneCount = document.getElementById('doneCount');
  const clearDoneBtn = document.getElementById('clearDoneBtn');
  const dateLabel = document.getElementById('dateLabel');

  const today = new Date();
  dateLabel.textContent = today.toLocaleDateString('tr-TR', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  function todayISO() {
    const d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  function dueLabel(due) {
    if (!due) return null;
    const t = todayISO();
    const dueDate = new Date(due);
    const formatted = dueDate.toLocaleDateString('tr-TR', {
      day: 'numeric', month: 'short'
    });
    let cls = '';
    let prefix = '📅 ';
    if (due < t) { cls = 'overdue'; prefix = '⚠️ '; }
    else if (due === t) { cls = 'today'; prefix = '⏰ '; }
    return { text: prefix + formatted, cls };
  }

  function priorityLabel(p) {
    if (p === 'high') return { text: 'Yüksek', cls: 'priority-high' };
    if (p === 'medium') return { text: 'Orta', cls: 'priority-medium' };
    if (p === 'low') return { text: 'Düşük', cls: 'priority-low' };
    return null;
  }

  function render() {
    taskList.innerHTML = '';
    const filtered = tasks.filter(t => {
      if (currentFilter === 'active') return !t.done;
      if (currentFilter === 'done') return t.done;
      return true;
    });

    if (filtered.length === 0) {
      taskList.innerHTML = '<div class="empty">Hiç görev yok 🎉</div>';
    } else {
      filtered.forEach(task => {
        const li = document.createElement('li');
        if (task.done) li.classList.add('done');
        if (task.priority) li.classList.add('priority-' + task.priority);
        li.draggable = true;
        li.dataset.id = task.id;

        li.addEventListener('dragstart', e => {
          dragSrcId = task.id;
          li.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        li.addEventListener('dragend', () => {
          li.classList.remove('dragging');
          document.querySelectorAll('li.drag-over').forEach(el => el.classList.remove('drag-over'));
        });
        li.addEventListener('dragover', e => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          if (task.id !== dragSrcId) li.classList.add('drag-over');
        });
        li.addEventListener('dragleave', () => li.classList.remove('drag-over'));
        li.addEventListener('drop', e => {
          e.preventDefault();
          li.classList.remove('drag-over');
          if (dragSrcId === null || dragSrcId === task.id) return;
          const fromIdx = tasks.findIndex(t => t.id === dragSrcId);
          const toIdx = tasks.findIndex(t => t.id === task.id);
          if (fromIdx === -1 || toIdx === -1) return;
          const [moved] = tasks.splice(fromIdx, 1);
          tasks.splice(toIdx, 0, moved);
          save();
          render();
        });

        const handle = document.createElement('span');
        handle.className = 'drag-handle';
        handle.textContent = '⋮⋮';
        handle.title = 'Sürükle';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = task.done;
        cb.addEventListener('change', () => {
          task.done = cb.checked;
          save();
          render();
        });

        const content = document.createElement('div');
        content.className = 'task-content';

        const textEl = document.createElement('div');
        textEl.className = 'task-text';
        textEl.textContent = task.text;
        content.appendChild(textEl);

        const meta = document.createElement('div');
        meta.className = 'task-meta';
        const pl = priorityLabel(task.priority);
        if (pl) {
          const b = document.createElement('span');
          b.className = 'badge badge-' + pl.cls;
          b.textContent = pl.text;
          meta.appendChild(b);
        }
        const dl = dueLabel(task.due);
        if (dl) {
          const b = document.createElement('span');
          b.className = 'badge badge-due ' + dl.cls;
          b.textContent = dl.text;
          meta.appendChild(b);
        }
        if (meta.children.length > 0) content.appendChild(meta);

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '×';
        del.title = 'Sil';
        del.addEventListener('click', () => {
          tasks = tasks.filter(t => t.id !== task.id);
          save();
          render();
        });

        li.append(handle, cb, content, del);
        taskList.appendChild(li);
      });
    }

    totalCount.textContent = `${tasks.length} görev`;
    doneCount.textContent = `${tasks.filter(t => t.done).length} tamamlandı`;
  }

  function addTask() {
    const text = taskInput.value.trim();
    if (!text) return;
    tasks.push({
      id: Date.now(),
      text,
      done: false,
      due: dueDateInput.value || null,
      priority: priorityInput.value || null
    });
    taskInput.value = '';
    dueDateInput.value = '';
    priorityInput.value = '';
    save();
    render();
  }

  addBtn.addEventListener('click', addTask);
  taskInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  clearDoneBtn.addEventListener('click', () => {
    if (!tasks.some(t => t.done)) return;
    if (confirm('Tamamlanan görevler silinsin mi?')) {
      tasks = tasks.filter(t => !t.done);
      save();
      render();
    }
  });

  render();
</script>
</body>
</html>
